name: Bug report
description: Report a reproducible bug in install, invocation, skill behavior, or documentation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Do not include secrets, tokens, private paths, or security issues here. For security issues, use the process in SECURITY.md instead of a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: What is going wrong?
      placeholder: A short summary of the issue.
    validations:
      required: true
  - type: dropdown
    id: tool_runtime
    attributes:
      label: Tool/runtime
      options:
        - Claude Code
    validations:
      required: true
  - type: input
    id: os_shell
    attributes:
      label: Operating system and shell
      placeholder: Windows 11 + PowerShell 5.1
    validations:
      required: true
  - type: input
    id: install_route
    attributes:
      label: Installation route used
      placeholder: User-level via install-user.ps1
    validations:
      required: true
  - type: input
    id: version_tag
    attributes:
      label: Version or tag tested
      placeholder: v1.0.0
    validations:
      required: true
  - type: checkboxes
    id: area
    attributes:
      label: Affected area
      options:
        - label: Install
        - label: Invocation
        - label: Skill behavior or safety gates
        - label: Trellis report output
        - label: Documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      description: Remove secrets, private paths, and sensitive details before pasting.
      render: text
